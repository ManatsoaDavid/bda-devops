# =============================================================
# secret.yaml — Credentials de la base de données
# Les valeurs sont encodées en base64
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: bda-secret
  namespace: { { .Values.namespace } }
  labels: { { - include "bda.labels" . | nindent 4 } }
type: Opaque
data:
  # echo -n "versements" | base64
  DB_NAME: dmVyc2VtZW50cw==

  # echo -n "versement_user" | base64
  DB_USER: dmVyc2VtZW50X3VzZXI=

  # echo -n "VersementSecret123" | base64
  DB_PASS: { { .Values.database.passwordBase64 } }

  # echo -n "5432" | base64
  DB_PORT: NTQzMg==

  # echo -n "postgres" | base64 (nom du Service K8s PostgreSQL)
  DB_HOST: cG9zdGdyZXM=
