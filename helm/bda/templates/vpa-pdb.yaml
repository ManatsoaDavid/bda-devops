apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: bda-backend-vpa
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: bda
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: backend
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: bda-frontend-vpa
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: bda
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: frontend
        minAllowed:
          cpu: 10m
          memory: 32Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bda-backend-pdb
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: bda
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  minAvailable: {{ .Values.pdb.backend.minAvailable }}
  selector:
    matchLabels:
      app: backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bda-frontend-pdb
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: bda
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  minAvailable: {{ .Values.pdb.frontend.minAvailable }}
  selector:
    matchLabels:
      app: frontend
