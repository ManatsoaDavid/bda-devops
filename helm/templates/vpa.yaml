# =============================================================
# vpa.yaml — Vertical Pod Autoscaler
# Mode "Off" = recommandations seulement (pas d'auto-apply)
# Après 24h, voir les recommandations avec :
# kubectl describe vpa -n bda
# =============================================================

apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: bda-backend-vpa
  namespace: { { .Values.namespace } }
  labels: { { - include "bda.labels" . | nindent 4 } }
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  updatePolicy:
    # Off = recommandations sans modification automatique
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: backend
        minAllowed:
          cpu: 10m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: bda-frontend-vpa
  namespace: { { .Values.namespace } }
  labels: { { - include "bda.labels" . | nindent 4 } }
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: frontend
        minAllowed:
          cpu: 10m
          memory: 32Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi

---
# =============================================================
# pdb.yaml — PodDisruptionBudget
# Garantit qu'au moins 1 pod reste disponible lors des
# mises à jour ou maintenances des nodes
# =============================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bda-backend-pdb
  namespace: { { .Values.namespace } }
  labels: { { - include "bda.labels" . | nindent 4 } }
spec:
  minAvailable: { { .Values.pdb.backend.minAvailable } }
  selector:
    matchLabels:
      app: backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bda-frontend-pdb
  namespace: { { .Values.namespace } }
  labels: { { - include "bda.labels" . | nindent 4 } }
spec:
  minAvailable: { { .Values.pdb.frontend.minAvailable } }
  selector:
    matchLabels:
      app: frontend
