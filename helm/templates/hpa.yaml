# =============================================================
# hpa.yaml — Horizontal Pod Autoscaler
# Scale automatiquement les pods selon l'utilisation CPU
# Démonstration haute disponibilité pour la présentation
# =============================================================

# ── HPA Backend ───────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bda-backend-hpa
  namespace: { { .Values.namespace } }
  labels: { { - include "bda.labels" . | nindent 4 } }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend

  minReplicas: { { .Values.hpa.backend.minReplicas } }
  maxReplicas: { { .Values.hpa.backend.maxReplicas } }

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale si CPU > 70%
          averageUtilization: { { .Values.hpa.backend.cpuThreshold } }

---
# ── HPA Frontend ──────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bda-frontend-hpa
  namespace: { { .Values.namespace } }
  labels: { { - include "bda.labels" . | nindent 4 } }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend

  minReplicas: { { .Values.hpa.frontend.minReplicas } }
  maxReplicas: { { .Values.hpa.frontend.maxReplicas } }

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: { { .Values.hpa.frontend.cpuThreshold } }
