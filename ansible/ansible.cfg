# ============================================================
# ansible.cfg
# Configuration Ansible pour le projet BDA
# ============================================================

[defaults]
# On tourne localement — on cible kubectl depuis Cloud Shell
inventory       = inventory.ini
host_key_checking = False
retry_files_enabled = False

# Affichage plus lisible dans le terminal
stdout_callback = yaml

[ssh_connection]
# Pas de SSH — on parle directement à K8s via kubectl
pipelining = True